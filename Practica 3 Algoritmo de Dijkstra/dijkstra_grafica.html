<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Dijkstra</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        .contenedor {
            background: white;
            width: 850px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0,0,0,0.2);
        }

        svg {
            border: 1px solid #cccccc;
            background: white;
            border-radius: 8px;
        }

        .ruta {
            font-size: 18px;
            font-weight: bold;
            color: #333333;
        }

        .nota {
            color: #555555;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <h1>Simulador del Algoritmo de Dijkstra</h1>

        <p class="ruta">Ruta más corta: A → C → B → D → E → F</p>
        <p class="ruta">Distancia total: 13</p>

        <svg width="750" height="500">
            
            <line x1="100" y1="250" x2="250" y2="120"
                  stroke="#777777" stroke-width="2" />

            <rect x="161.0" y="173.0"
                  width="28" height="24" fill="white" />

            <text x="175.0" y="190.0" text-anchor="middle"
                  font-size="14" font-weight="bold">4</text>
            
            <line x1="100" y1="250" x2="250" y2="380"
                  stroke="#e53935" stroke-width="5" />

            <rect x="161.0" y="303.0"
                  width="28" height="24" fill="white" />

            <text x="175.0" y="320.0" text-anchor="middle"
                  font-size="14" font-weight="bold">2</text>
            
            <line x1="250" y1="120" x2="250" y2="380"
                  stroke="#e53935" stroke-width="5" />

            <rect x="236.0" y="238.0"
                  width="28" height="24" fill="white" />

            <text x="250.0" y="255.0" text-anchor="middle"
                  font-size="14" font-weight="bold">1</text>
            
            <line x1="250" y1="120" x2="430" y2="120"
                  stroke="#e53935" stroke-width="5" />

            <rect x="326.0" y="108.0"
                  width="28" height="24" fill="white" />

            <text x="340.0" y="125.0" text-anchor="middle"
                  font-size="14" font-weight="bold">5</text>
            
            <line x1="250" y1="380" x2="430" y2="120"
                  stroke="#777777" stroke-width="2" />

            <rect x="326.0" y="238.0"
                  width="28" height="24" fill="white" />

            <text x="340.0" y="255.0" text-anchor="middle"
                  font-size="14" font-weight="bold">8</text>
            
            <line x1="250" y1="380" x2="430" y2="380"
                  stroke="#777777" stroke-width="2" />

            <rect x="326.0" y="368.0"
                  width="28" height="24" fill="white" />

            <text x="340.0" y="385.0" text-anchor="middle"
                  font-size="14" font-weight="bold">10</text>
            
            <line x1="430" y1="120" x2="430" y2="380"
                  stroke="#e53935" stroke-width="5" />

            <rect x="416.0" y="238.0"
                  width="28" height="24" fill="white" />

            <text x="430.0" y="255.0" text-anchor="middle"
                  font-size="14" font-weight="bold">2</text>
            
            <line x1="430" y1="120" x2="620" y2="250"
                  stroke="#777777" stroke-width="2" />

            <rect x="511.0" y="173.0"
                  width="28" height="24" fill="white" />

            <text x="525.0" y="190.0" text-anchor="middle"
                  font-size="14" font-weight="bold">6</text>
            
            <line x1="430" y1="380" x2="620" y2="250"
                  stroke="#e53935" stroke-width="5" />

            <rect x="511.0" y="303.0"
                  width="28" height="24" fill="white" />

            <text x="525.0" y="320.0" text-anchor="middle"
                  font-size="14" font-weight="bold">3</text>
            
            
        <circle cx="100" cy="250" r="24"
                fill="#7CFC98" stroke="black" stroke-width="2" />

        <text x="100" y="255" text-anchor="middle"
              font-size="16" font-weight="bold">A</text>
        
        <circle cx="250" cy="120" r="24"
                fill="#FFD966" stroke="black" stroke-width="2" />

        <text x="250" y="125" text-anchor="middle"
              font-size="16" font-weight="bold">B</text>
        
        <circle cx="250" cy="380" r="24"
                fill="#FFD966" stroke="black" stroke-width="2" />

        <text x="250" y="385" text-anchor="middle"
              font-size="16" font-weight="bold">C</text>
        
        <circle cx="430" cy="120" r="24"
                fill="#FFD966" stroke="black" stroke-width="2" />

        <text x="430" y="125" text-anchor="middle"
              font-size="16" font-weight="bold">D</text>
        
        <circle cx="430" cy="380" r="24"
                fill="#FFD966" stroke="black" stroke-width="2" />

        <text x="430" y="385" text-anchor="middle"
              font-size="16" font-weight="bold">E</text>
        
        <circle cx="620" cy="250" r="24"
                fill="#87CEFA" stroke="black" stroke-width="2" />

        <text x="620" y="255" text-anchor="middle"
              font-size="16" font-weight="bold">F</text>
        
        </svg>

        <p class="nota">
            La ruta más corta aparece en rojo.
            El nodo inicial está en verde y el nodo final en azul.
        </p>
    </div>
</body>
</html>
