<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Árbol Parcial Mínimo de Prim</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
    }

    .contenedor {
      display: grid;
      grid-template-columns: 310px 1fr;
      gap: 18px;
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
    }

    svg {
      width: 100%;
      height: 540px;
      background: #eef2ff;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }

    th, td {
      padding: 9px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
    }

    th {
      background: #eff6ff;
    }

    .costo {
      font-size: 20px;
      font-weight: bold;
      color: #16a34a;
    }

    .nota {
      color: #475569;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <h1>Simulador del Árbol Parcial Mínimo de Prim</h1>

  <div class="contenedor">
    <section class="panel">
      <h2>Resultado</h2>

      <p class="nota">
        Las aristas verdes forman el árbol parcial mínimo.
        Las aristas grises pertenecen al grafo original.
      </p>

      <p>Costo total:</p>
      <p class="costo">13</p>

      <h2>Aristas seleccionadas</h2>

      <table>
        <thead>
          <tr>
            <th>Origen</th>
            <th>Destino</th>
            <th>Peso</th>
          </tr>
        </thead>

        <tbody>
          
        <tr>
          <td>A</td>
          <td>C</td>
          <td>2</td>
        </tr>
        
        <tr>
          <td>C</td>
          <td>B</td>
          <td>1</td>
        </tr>
        
        <tr>
          <td>C</td>
          <td>D</td>
          <td>3</td>
        </tr>
        
        <tr>
          <td>B</td>
          <td>E</td>
          <td>5</td>
        </tr>
        
        <tr>
          <td>E</td>
          <td>F</td>
          <td>2</td>
        </tr>
        
        </tbody>
      </table>
    </section>

        <line x1="120" y1="120" x2="330" y2="90"

              width="28" height="22" fill="#eef2ff" />

        <text x="225.0" y="109.0" text-anchor="middle"
              font-size="14" font-weight="bold">4</text>
        
        <line x1="120" y1="120" x2="230" y2="260"
              stroke="#16a34a" stroke-width="5" />

        <rect x="161.0" y="177.0"
